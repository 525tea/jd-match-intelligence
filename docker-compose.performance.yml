services:
  backend:
    environment:
      SPRING_PROFILES_ACTIVE: ${PERF_SPRING_PROFILES_ACTIVE:-local,performance}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${PERF_DB_NAME:-jobflow_perf}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${PERF_DB_USER:-jobflow}
      SPRING_DATASOURCE_PASSWORD: ${PERF_DB_PASSWORD:-jobflow}
      SPRING_FLYWAY_ENABLED: "false"
      APP_SEARCH_ELASTICSEARCH_INDEX_NAME: ${ELASTICSEARCH_JOBS_ALIAS:-jobflow-jobs-performance}
      ELASTICSEARCH_JOBS_ALIAS: ${ELASTICSEARCH_JOBS_ALIAS:-jobflow-jobs-performance}
      ELASTICSEARCH_JOBS_INDEX: ${ELASTICSEARCH_JOBS_INDEX:-jobflow-jobs-performance-v1}
      ELASTICSEARCH_REINDEX_ON_STARTUP: ${ELASTICSEARCH_REINDEX_ON_STARTUP:-true}
      ELASTICSEARCH_REINDEX_BATCH_SIZE: ${ELASTICSEARCH_REINDEX_BATCH_SIZE:-500}
      SKILL_TREND_AGGREGATION_SCHEDULER_ENABLED: "false"
      DEADLINE_REMINDER_SCHEDULER_ENABLED: ${PERF_DEADLINE_REMINDER_SCHEDULER_ENABLED:-false}
      DEADLINE_REMINDER_FIXED_DELAY: ${PERF_DEADLINE_REMINDER_FIXED_DELAY:-3600000}
      DEADLINE_REMINDER_INITIAL_DELAY: ${PERF_DEADLINE_REMINDER_INITIAL_DELAY:-60000}
      DEADLINE_REMINDER_RUNNER_ENABLED: ${PERF_DEADLINE_REMINDER_RUNNER_ENABLED:-false}
      APP_NOTIFICATION_EMAIL_PROVIDER: ${PERF_NOTIFICATION_EMAIL_PROVIDER:-mock}
      APP_NOTIFICATION_MOCK_EMAIL_FAIL: ${PERF_NOTIFICATION_MOCK_EMAIL_FAIL:-false}
      APP_NOTIFICATION_MOCK_EMAIL_FAILURE_REASON: ${PERF_NOTIFICATION_MOCK_EMAIL_FAILURE_REASON:-performance mock email failure}
      APP_NOTIFICATION_MOCK_EMAIL_PROVIDER_MESSAGE_ID_PREFIX: ${PERF_NOTIFICATION_MOCK_EMAIL_PROVIDER_MESSAGE_ID_PREFIX:-performance-deadline-reminder}

  gateway:
    environment:
      GATEWAY_RATE_LIMIT_ENABLED: ${PERF_GATEWAY_RATE_LIMIT_ENABLED:-false}
      GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE: ${PERF_GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE:-100000}
