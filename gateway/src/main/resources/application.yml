server:
  port: ${GATEWAY_PORT:8081}
  shutdown: graceful

gateway:
  backend-url: ${BACKEND_URL:http://localhost:8080}
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE:100}
  security-events:
    enabled: ${GATEWAY_SECURITY_EVENTS_ENABLED:false}
    topic: ${GATEWAY_SECURITY_EVENTS_TOPIC:security.events}
    service: ${GATEWAY_SECURITY_EVENTS_SERVICE:gateway}
    environment: ${GATEWAY_SECURITY_EVENTS_ENVIRONMENT:${spring.profiles.active:local}}

spring:
  application:
    name: jobflow-gateway

  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_PHASE_TIMEOUT:30s}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jackson:
    serialization:
      write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  cloud:
    gateway:
      server:
        webflux:
          enabled: true

resilience4j:
  circuitbreaker:
    instances:
      backendApiCircuitBreaker:
        sliding-window-type: count_based
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      backendApiCircuitBreaker:
        timeout-duration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: jobflow-gateway
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
