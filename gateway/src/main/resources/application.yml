server:
  port: ${GATEWAY_PORT:8081}
  shutdown: graceful

gateway:
  backend-url: ${BACKEND_URL:http://localhost:8080}
  backend-circuit-breaker:
    enabled: ${GATEWAY_BACKEND_CIRCUIT_BREAKER_ENABLED:true}
  rate-limit:
    enabled: ${GATEWAY_RATE_LIMIT_ENABLED:true}
    requests-per-minute: ${GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE:100}
  security-events:
    enabled: ${GATEWAY_SECURITY_EVENTS_ENABLED:false}
    topic: ${GATEWAY_SECURITY_EVENTS_TOPIC:security.events}
    service: ${GATEWAY_SECURITY_EVENTS_SERVICE:${spring.application.name}}
    environment: ${GATEWAY_SECURITY_EVENTS_ENVIRONMENT:${spring.profiles.active:local}}

spring:
  application:
    name: jobflow-gateway

  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_PHASE_TIMEOUT:30s}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  cloud:
    gateway:
      server:
        webflux:
          enabled: true

resilience4j:
  circuitbreaker:
    instances:
      backendApiCircuitBreaker:
        sliding-window-type: count_based
        sliding-window-size: ${GATEWAY_BACKEND_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:10}
        minimum-number-of-calls: ${GATEWAY_BACKEND_CIRCUIT_BREAKER_MINIMUM_NUMBER_OF_CALLS:5}
        failure-rate-threshold: ${GATEWAY_BACKEND_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
        wait-duration-in-open-state: ${GATEWAY_BACKEND_CIRCUIT_BREAKER_WAIT_DURATION_IN_OPEN_STATE:10s}
        permitted-number-of-calls-in-half-open-state: ${GATEWAY_BACKEND_CIRCUIT_BREAKER_PERMITTED_HALF_OPEN_CALLS:3}
  timelimiter:
    instances:
      backendApiCircuitBreaker:
        timeout-duration: ${GATEWAY_BACKEND_TIME_LIMITER_TIMEOUT_DURATION:30s}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: jobflow-gateway
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
