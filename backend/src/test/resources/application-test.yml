spring:
  datasource:
    url: jdbc:h2:mem:jobflow-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
            scope:
              - read:user
              - user:email
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope:
              - profile
              - email

app:
  jwt:
    secret: jobflow-test-secret-key-must-be-at-least-32-bytes-long
    access-token-expiration-millis: 3600000
