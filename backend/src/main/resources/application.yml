spring:
  application:
    name: jobflow

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: embedded

  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://localhost:9200}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cache:
    trend-ttl: ${CACHE_TREND_TTL:6h}
    gap-analysis-ttl: ${CACHE_GAP_ANALYSIS_TTL:30m}
    jd-match-ttl: ${CACHE_JD_MATCH_TTL:30m}
    recommendation-ttl: ${CACHE_RECOMMENDATION_TTL:10m}
    project-inventory-ttl: ${CACHE_PROJECT_INVENTORY_TTL:1h}

  search:
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://localhost:9200}
      index-name: jobflow-jobs
      physical-index-name: ${ELASTICSEARCH_JOBS_INDEX:jobflow-jobs-v1}
      initialize-on-startup: false
      query-expansion-enabled: ${ELASTICSEARCH_QUERY_EXPANSION_ENABLED:true}
      reindex-on-startup: ${ELASTICSEARCH_REINDEX_ON_STARTUP:false}
      reindex-batch-size: ${ELASTICSEARCH_REINDEX_BATCH_SIZE:100}

  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration-millis: 3600000

  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:3000/oauth2/success}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000/oauth2/failure}
    provider-token:
      encryption-key: ${OAUTH2_PROVIDER_TOKEN_ENCRYPTION_KEY:}

  notification:
    deadline-reminder:
      window: ${DEADLINE_REMINDER_WINDOW:24h}
      idempotency-ttl: ${DEADLINE_REMINDER_IDEMPOTENCY_TTL:25h}
      max-attempts: ${DEADLINE_REMINDER_MAX_ATTEMPTS:3}
    mailgun:
      base-url: ${MAILGUN_BASE_URL:https://api.mailgun.net}
      domain: ${MAILGUN_DOMAIN:}
      api-key: ${MAILGUN_API_KEY:}
      from: ${MAILGUN_FROM:no-reply@localhost}

jobflow:
  analytics:
    skill-trend:
      scheduler:
        enabled: ${SKILL_TREND_AGGREGATION_SCHEDULER_ENABLED:true}
      fixed-delay: ${SKILL_TREND_AGGREGATION_FIXED_DELAY:3600000}
      initial-delay: ${SKILL_TREND_AGGREGATION_INITIAL_DELAY:60000}
      runner:
        enabled: ${SKILL_TREND_AGGREGATION_RUNNER_ENABLED:false}
        target-month: ${SKILL_TREND_AGGREGATION_TARGET_MONTH:}
