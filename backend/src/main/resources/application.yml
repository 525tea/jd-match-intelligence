spring:
  application:
    name: jobflow

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: embedded

  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://localhost:9200}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  search:
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://localhost:9200}
      index-name: jobflow-jobs
      physical-index-name: ${ELASTICSEARCH_JOBS_INDEX:jobflow-jobs-v1}
      initialize-on-startup: false
      reindex-on-startup: ${ELASTICSEARCH_REINDEX_ON_STARTUP:false}
      reindex-batch-size: ${ELASTICSEARCH_REINDEX_BATCH_SIZE:100}

  jwt:
    secret: ${JWT_SECRET:}
    access-token-expiration-millis: 3600000

  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:3000/oauth2/success}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:3000/oauth2/failure}

jobflow:
  analytics:
    skill-trend:
      scheduler:
        enabled: ${SKILL_TREND_AGGREGATION_SCHEDULER_ENABLED:true}
      fixed-delay: ${SKILL_TREND_AGGREGATION_FIXED_DELAY:3600000}
      initial-delay: ${SKILL_TREND_AGGREGATION_INITIAL_DELAY:60000}
      runner:
        enabled: ${SKILL_TREND_AGGREGATION_RUNNER_ENABLED:false}
        target-month: ${SKILL_TREND_AGGREGATION_TARGET_MONTH:}
