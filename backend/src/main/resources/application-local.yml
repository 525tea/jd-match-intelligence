spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jobflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: jobflow
    password: jobflow
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  search:
    elasticsearch:
      url: http://localhost:9200
