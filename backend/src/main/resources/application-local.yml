spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jobflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: jobflow
    password: jobflow
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  search:
    elasticsearch:
      url: http://localhost:9200
      index-name: jobflow-jobs

  jwt:
    secret: ${JWT_SECRET:jobflow-local-development-secret-key-must-be-at-least-32-bytes}

logging:
  level:
    org.flywaydb: debug
    org.springframework.boot.autoconfigure.flyway: debug
