spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jobflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: jobflow
    password: jobflow
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  search:
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://localhost:9200}
      index-name: ${ELASTICSEARCH_JOBS_ALIAS:jobflow-jobs}
      physical-index-name: ${ELASTICSEARCH_JOBS_INDEX:jobflow-jobs-v1}
      initialize-on-startup: false
      query-expansion-enabled: ${ELASTICSEARCH_QUERY_EXPANSION_ENABLED:true}
      reindex-on-startup: ${ELASTICSEARCH_REINDEX_ON_STARTUP:false}
      reindex-batch-size: ${ELASTICSEARCH_REINDEX_BATCH_SIZE:100}

  jwt:
    secret: ${JWT_SECRET:jobflow-local-development-secret-key-must-be-at-least-32-bytes}

  auth:
    demo:
      enabled: ${DEMO_LOGIN_ENABLED:true}

logging:
  level:
    org.flywaydb: debug
    org.springframework.boot.autoconfigure.flyway: debug
