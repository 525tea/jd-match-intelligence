spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jobflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: jobflow
    password: jobflow
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - read:user
              - user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email

app:
  search:
    elasticsearch:
      url: http://localhost:9200

logging:
  level:
    org.flywaydb: debug
    org.springframework.boot.autoconfigure.flyway: debug
