spring:
  datasource:
    url: jdbc:mysql://${PERF_DB_HOST:localhost}:${PERF_DB_PORT:3306}/${PERF_DB_NAME:jobflow_perf}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${PERF_DB_USER:jobflow}
    password: ${PERF_DB_PASSWORD:jobflow}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: false
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

app:
  search:
    elasticsearch:
      index-name: ${ELASTICSEARCH_JOBS_ALIAS:jobflow-jobs-performance}
      physical-index-name: ${ELASTICSEARCH_JOBS_INDEX:jobflow-jobs-performance-v1}
      initialize-on-startup: false
      reindex-on-startup: ${ELASTICSEARCH_REINDEX_ON_STARTUP:true}
      reindex-batch-size: ${ELASTICSEARCH_REINDEX_BATCH_SIZE:500}

jobflow:
  notification:
    deadline-reminder:
      scheduler:
        enabled: false
    daily-digest:
      runner:
        enabled: false

  analytics:
    skill-trend:
      scheduler:
        enabled: false
