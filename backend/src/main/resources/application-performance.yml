spring:
  datasource:
    url: jdbc:mysql://${PERF_DB_HOST:localhost}:${PERF_DB_PORT:3306}/${PERF_DB_NAME:jobflow_perf}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${PERF_DB_USER:jobflow}
    password: ${PERF_DB_PASSWORD:jobflow}
    driver-class-name: com.mysql.cj.jdbc.Driver

  elasticsearch:
    connection-timeout: ${PERF_ELASTICSEARCH_CONNECTION_TIMEOUT:5s}
    socket-timeout: ${PERF_ELASTICSEARCH_SOCKET_TIMEOUT:30s}

  data:
    redis:
      connect-timeout: ${PERF_REDIS_CONNECT_TIMEOUT:${REDIS_CONNECT_TIMEOUT:500ms}}
      timeout: ${PERF_REDIS_TIMEOUT:${REDIS_TIMEOUT:500ms}}

  flyway:
    enabled: false
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    elasticsearch:
      enabled: ${PERF_MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED:false}

elasticsearch:
  index:
    number-of-shards: ${ELASTICSEARCH_INDEX_NUMBER_OF_SHARDS:1}
    number-of-replicas: ${ELASTICSEARCH_INDEX_NUMBER_OF_REPLICAS:0}

app:
  search:
    elasticsearch:
      index-name: ${ELASTICSEARCH_JOBS_ALIAS:jobflow-jobs-performance}
      physical-index-name: ${ELASTICSEARCH_JOBS_INDEX:jobflow-jobs-performance-v1}
      initialize-on-startup: false
      reindex-on-startup: ${ELASTICSEARCH_REINDEX_ON_STARTUP:true}
      reindex-batch-size: ${ELASTICSEARCH_REINDEX_BATCH_SIZE:500}

jobflow:
  kafka:
    consumer:
      enabled: ${JOBFLOW_KAFKA_CONSUMER_ENABLED:true}
      group-id: ${JOBFLOW_KAFKA_CONSUMER_GROUP_ID:jobflow-backend-performance}
      concurrency: ${JOBFLOW_KAFKA_CONSUMER_CONCURRENCY:3}
      auto-offset-reset: ${JOBFLOW_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
      search:
        refresh-after-index: ${JOBFLOW_KAFKA_CONSUMER_SEARCH_REFRESH_AFTER_INDEX:true}

  outbox:
    relay:
      publisher: ${OUTBOX_RELAY_PUBLISHER:kafka}

  notification:
    deadline-reminder:
      scheduler:
        enabled: ${DEADLINE_REMINDER_SCHEDULER_ENABLED:false}
      fixed-delay: ${DEADLINE_REMINDER_FIXED_DELAY:3600000}
      initial-delay: ${DEADLINE_REMINDER_INITIAL_DELAY:60000}
      runner:
        enabled: ${DEADLINE_REMINDER_RUNNER_ENABLED:false}
    daily-digest:
      runner:
        enabled: ${DAILY_DIGEST_RUNNER_ENABLED:false}

  analytics:
    skill-trend:
      scheduler:
        enabled: ${SKILL_TREND_AGGREGATION_SCHEDULER_ENABLED:false}
