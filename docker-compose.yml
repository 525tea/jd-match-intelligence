services:
  mysql:
    image: mysql:8.4
    container_name: jobflow-mysql
    mem_limit: ${MYSQL_MEMORY_LIMIT:-1g}
    environment:
      MYSQL_DATABASE: jobflow
      MYSQL_USER: jobflow
      MYSQL_PASSWORD: jobflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --server-id=${MYSQL_SERVER_ID:-223344}
      - --log-bin=${MYSQL_BINLOG_BASENAME:-mysql-bin}
      - --binlog-format=ROW
      - --binlog-row-image=FULL
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u jobflow -pjobflow --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: jobflow-redis
    mem_limit: ${REDIS_MEMORY_LIMIT:-256m}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: ./infra/elasticsearch
    image: jobflow-elasticsearch:9.2.8-nori
    container_name: jobflow-elasticsearch
    mem_limit: ${ELASTICSEARCH_MEMORY_LIMIT:-1g}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: jobflow-zookeeper
    mem_limit: ${ZOOKEEPER_MEMORY_LIMIT:-512m}
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: jobflow-kafka
    mem_limit: ${KAFKA_MEMORY_LIMIT:-1g}
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: jobflow-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - bash
      - -lc
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic job.created --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic application.events --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic email.send --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic es.index --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic security.events --partitions ${KAFKA_TOPIC_PARTITIONS:-3} --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic jobflow-connect-configs --partitions 1 --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1} --config cleanup.policy=compact
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic jobflow-connect-offsets --partitions 25 --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1} --config cleanup.policy=compact
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic jobflow-connect-status --partitions 5 --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1} --config cleanup.policy=compact
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic schema-changes.jobflow --partitions 1 --replication-factor ${KAFKA_TOPIC_REPLICATION_FACTOR:-1} --config cleanup.policy=compact
        kafka-topics --bootstrap-server kafka:29092 --list

  debezium-connect:
    image: ${DEBEZIUM_CONNECT_IMAGE:-quay.io/debezium/connect:3.0}
    container_name: jobflow-debezium-connect
    mem_limit: ${DEBEZIUM_CONNECT_MEMORY_LIMIT:-1g}
    ports:
      - "${DEBEZIUM_CONNECT_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: ${DEBEZIUM_CONNECT_GROUP_ID:-jobflow-connect}
      CONFIG_STORAGE_TOPIC: ${DEBEZIUM_CONNECT_CONFIG_TOPIC:-jobflow-connect-configs}
      OFFSET_STORAGE_TOPIC: ${DEBEZIUM_CONNECT_OFFSET_TOPIC:-jobflow-connect-offsets}
      STATUS_STORAGE_TOPIC: ${DEBEZIUM_CONNECT_STATUS_TOPIC:-jobflow-connect-status}
      CONFIG_STORAGE_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
      OFFSET_STORAGE_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
      STATUS_STORAGE_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-connect
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8083/connectors >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: jobflow-kafka-exporter
    mem_limit: ${KAFKA_EXPORTER_MEMORY_LIMIT:-128m}
    command:
      - "--kafka.server=kafka:29092"
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    image: jobflow-backend:local
    container_name: jobflow-backend
    mem_limit: ${BACKEND_MEMORY_LIMIT:-1g}
    environment:
      JAVA_TOOL_OPTIONS: ${BACKEND_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jobflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
      JWT_SECRET: jobflow-local-development-secret-key-must-be-at-least-32-bytes
      HIKARI_MAXIMUM_POOL_SIZE: ${HIKARI_MAXIMUM_POOL_SIZE:-20}
      HIKARI_MINIMUM_IDLE: ${HIKARI_MINIMUM_IDLE:-5}
      SHUTDOWN_PHASE_TIMEOUT: ${SHUTDOWN_PHASE_TIMEOUT:-30s}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:8081/api/login/oauth2/code/github}
      OAUTH2_PROVIDER_TOKEN_ENCRYPTION_KEY: ${OAUTH2_PROVIDER_TOKEN_ENCRYPTION_KEY:-}
      OAUTH2_SUCCESS_REDIRECT_URI: ${OAUTH2_SUCCESS_REDIRECT_URI:-http://localhost:5173/oauth2/success}
      OAUTH2_FAILURE_REDIRECT_URI: ${OAUTH2_FAILURE_REDIRECT_URI:-http://localhost:5173/oauth2/failure}
      DEMO_LOGIN_ENABLED: ${DEMO_LOGIN_ENABLED:-true}
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-false}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_NAME: ${ADMIN_BOOTSTRAP_NAME:-Admin}
      SKILL_TREND_AGGREGATION_SCHEDULER_ENABLED: "false"
      DEADLINE_REMINDER_SCHEDULER_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  zipkin:
    image: openzipkin/zipkin:3.4.0
    container_name: jobflow-zipkin
    mem_limit: ${ZIPKIN_MEMORY_LIMIT:-512m}
    ports:
      - "9411:9411"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: jobflow-gateway:local
    container_name: jobflow-gateway
    mem_limit: ${GATEWAY_MEMORY_LIMIT:-512m}
    environment:
      JAVA_TOOL_OPTIONS: ${GATEWAY_JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
      BACKEND_URL: http://backend:8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      GATEWAY_RATE_LIMIT_ENABLED: ${GATEWAY_RATE_LIMIT_ENABLED:-true}
      GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE: ${GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE:-100}
      GATEWAY_SECURITY_EVENTS_ENABLED: ${GATEWAY_SECURITY_EVENTS_ENABLED:-true}
      GATEWAY_SECURITY_EVENTS_TOPIC: ${GATEWAY_SECURITY_EVENTS_TOPIC:-security.events}
      GATEWAY_SECURITY_EVENTS_ENVIRONMENT: ${GATEWAY_SECURITY_EVENTS_ENVIRONMENT:-local}
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
      SHUTDOWN_PHASE_TIMEOUT: ${SHUTDOWN_PHASE_TIMEOUT:-30s}
    ports:
      - "8081:8081"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      zipkin:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  logstash:
    image: docker.elastic.co/logstash/logstash:9.2.8
    container_name: jobflow-logstash
    mem_limit: ${LOGSTASH_MEMORY_LIMIT:-1g}
    environment:
      LS_JAVA_OPTS: ${LOGSTASH_JAVA_OPTS:--Xms512m -Xmx512m}
      LOGSTASH_KAFKA_BOOTSTRAP_SERVERS: ${LOGSTASH_KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      LOGSTASH_SECURITY_EVENTS_TOPIC: ${LOGSTASH_SECURITY_EVENTS_TOPIC:-security.events}
      LOGSTASH_SECURITY_EVENTS_GROUP_ID: ${LOGSTASH_SECURITY_EVENTS_GROUP_ID:-jobflow-logstash-security-events}
      LOGSTASH_SECURITY_EVENTS_AUTO_OFFSET_RESET: ${LOGSTASH_SECURITY_EVENTS_AUTO_OFFSET_RESET:-latest}
      LOGSTASH_ELASTICSEARCH_URL: ${LOGSTASH_ELASTICSEARCH_URL:-http://elasticsearch:9200}
      LOGSTASH_SECURITY_EVENTS_INDEX: ${LOGSTASH_SECURITY_EVENTS_INDEX:-jobflow-security-events}
      XPACK_MONITORING_ENABLED: "false"
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.8
    container_name: jobflow-kibana
    mem_limit: ${KIBANA_MEMORY_LIMIT:-1g}
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
      SERVER_NAME: jobflow-kibana
      SERVER_HOST: 0.0.0.0
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "jobflow-kibana-encryption-key-32chars!!"
      XPACK_SECURITY_ENCRYPTIONKEY: "jobflow-kibana-security-key-32chars!!!!"
      XPACK_REPORTING_ENCRYPTIONKEY: "jobflow-kibana-reporting-key-32chars!!!"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: jobflow-prometheus
    mem_limit: ${PROMETHEUS_MEMORY_LIMIT:-512m}
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      backend:
        condition: service_healthy
      gateway:
        condition: service_healthy
      kafka-exporter:
        condition: service_started

  grafana:
    image: grafana/grafana:10.4.2
    container_name: jobflow-grafana
    mem_limit: ${GRAFANA_MEMORY_LIMIT:-512m}
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  es-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  grafana-data:
