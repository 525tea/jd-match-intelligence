services:
  mysql:
    image: mysql:8.4
    container_name: jobflow-mysql
    environment:
      MYSQL_DATABASE: jobflow
      MYSQL_USER: jobflow
      MYSQL_PASSWORD: jobflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.4
    container_name: jobflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  elasticsearch:
    build:
      context: ./infra/elasticsearch
    image: jobflow-elasticsearch:8.17.0-nori
    container_name: jobflow-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data

volumes:
  mysql-data:
  redis-data:
  es-data:
