services:
  mysql:
    image: mysql:8.4
    container_name: jobflow-mysql
    environment:
      MYSQL_DATABASE: jobflow
      MYSQL_USER: jobflow
      MYSQL_PASSWORD: jobflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u jobflow -pjobflow --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: jobflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: ./infra/elasticsearch
    image: jobflow-elasticsearch:9.2.8-nori
    container_name: jobflow-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./backend
    image: jobflow-backend:local
    container_name: jobflow-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jobflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
      JWT_SECRET: jobflow-local-development-secret-key-must-be-at-least-32-bytes
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-http://localhost:8081/api/login/oauth2/code/github}
      OAUTH2_PROVIDER_TOKEN_ENCRYPTION_KEY: ${OAUTH2_PROVIDER_TOKEN_ENCRYPTION_KEY:-}
      OAUTH2_SUCCESS_REDIRECT_URI: ${OAUTH2_SUCCESS_REDIRECT_URI:-http://localhost:5173/oauth2/success}
      OAUTH2_FAILURE_REDIRECT_URI: ${OAUTH2_FAILURE_REDIRECT_URI:-http://localhost:5173/oauth2/failure}
      DEMO_LOGIN_ENABLED: ${DEMO_LOGIN_ENABLED:-true}
      SKILL_TREND_AGGREGATION_SCHEDULER_ENABLED: "false"
      DEADLINE_REMINDER_SCHEDULER_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      zipkin:
        condition: service_started

  zipkin:
    image: openzipkin/zipkin:3.4.0
    container_name: jobflow-zipkin
    ports:
      - "9411:9411"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: jobflow-gateway:local
    container_name: jobflow-gateway
    environment:
      BACKEND_URL: http://backend:8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GATEWAY_RATE_LIMIT_REQUESTS_PER_MINUTE: 100
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      TRACING_SAMPLING_PROBABILITY: "1.0"
    ports:
      - "8081:8081"
    depends_on:
      - backend
      - redis
      - zipkin

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: jobflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.4.2
    container_name: jobflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-data:
  redis-data:
  es-data:
  grafana-data:
