spring.application.name=collector
app.collector.enabled=false
app.collector.source=ZIGHANG
app.collector.preview-limit=5
app.collector.collect-limit=100
app.collector.saramin.mode=api
app.collector.saramin.api-base-url=https://oapi.saramin.co.kr/job-search
app.collector.saramin.access-key=${SARAMIN_ACCESS_KEY:}
app.collector.saramin.default-count=100
app.normalization-candidate-collection.enabled=false
app.crawler.user-agent=JobFlowCrawler/0.1
app.crawler.default-request-delay=5s
app.crawler.default-daily-max-requests=5000
app.crawler.sources.ZIGHANG.base-url=https://zighang.com
app.crawler.sources.ZIGHANG.robots-url=https://zighang.com/robots.txt
app.crawler.sources.ZIGHANG.sitemap-url=https://zighang.com/seo/sitemap/sitemap-index.xml
app.crawler.sources.ZIGHANG.allowed-path-prefixes=/recruitment,/seo/sitemap
app.crawler.sources.ZIGHANG.disallowed-path-prefixes=/api,/short,/join,/menu
app.crawler.sources.JUMPIT.base-url=https://jumpit.saramin.co.kr
app.crawler.sources.JUMPIT.robots-url=https://jumpit.saramin.co.kr/robots.txt
app.crawler.sources.JUMPIT.sitemap-url=https://jumpit.saramin.co.kr/sitemap.xml
app.crawler.sources.JUMPIT.allowed-path-prefixes=/position,/sitemap
app.crawler.sources.JUMPIT.disallowed-path-prefixes=/resumes,/resume,/myjumpit,/applications-status,/celebrate,/scraps,/account,/notifications,/mypassword,/leave,/auth,/mobile,/hello
app.crawler.sources.SARAMIN.base-url=https://www.saramin.co.kr
app.crawler.sources.SARAMIN.robots-url=https://www.saramin.co.kr/robots.txt
app.crawler.sources.SARAMIN.sitemap-url=https://www.saramin.co.kr/sitemap.xml
app.crawler.sources.SARAMIN.allowed-path-prefixes=/zf_user/jobs/relay/view
app.crawler.sources.SARAMIN.disallowed-path-prefixes=/zf_user/member,/zf_user/persons
app.crawler.sources.JOBKOREA.base-url=https://www.jobkorea.co.kr
app.crawler.sources.JOBKOREA.robots-url=https://www.jobkorea.co.kr/robots.txt
app.crawler.sources.JOBKOREA.sitemap-url=https://www.jobkorea.co.kr/sitemap.xml
app.crawler.sources.JOBKOREA.allowed-path-prefixes=/recruit/joblist,/Recruit/GI_Read,/company,/review,/salary,/help,/goodjob/Tip,/starter,/recruit/careers/articles,/recruit/ai-jobs
app.crawler.sources.JOBKOREA.disallowed-path-prefixes=/login,/user,/my,/account,/RecrtMng,/corp,/text_co,/Salary/mylist,/Recruit/JobList/SpaceClick,/Search,/recruit/ai-jobs/search
app.crawler.sources.WANTED.base-url=https://www.wanted.co.kr
app.crawler.sources.WANTED.robots-url=https://www.wanted.co.kr/robots.txt
app.crawler.sources.WANTED.sitemap-url=https://www.wanted.co.kr/api/v4/jobs
app.crawler.sources.WANTED.allowed-path-prefixes=/api/v4/jobs,/wd
app.crawler.sources.WANTED.disallowed-path-prefixes=/login,/auth,/api/v4/applications
app.crawler.sources.WANTED.request-delay=1s
