global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: jobflow-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - backend:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: jobflow-backend

  - job_name: jobflow-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway:8081
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: jobflow-gateway

  - job_name: jobflow-kafka-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - kafka-exporter:9308
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: jobflow-kafka-exporter
