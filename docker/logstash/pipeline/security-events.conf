input {
  kafka {
    bootstrap_servers => "${LOGSTASH_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}"
    topics => ["${LOGSTASH_SECURITY_EVENTS_TOPIC:security.events}"]
    group_id => "${LOGSTASH_SECURITY_EVENTS_GROUP_ID:jobflow-logstash-security-events}"
    auto_offset_reset => "${LOGSTASH_SECURITY_EVENTS_AUTO_OFFSET_RESET:latest}"
    codec => json
    decorate_events => true
  }
}

filter {
  mutate {
    add_field => {
      "pipeline" => "gateway-security-events"
      "kafka_topic" => "%{[@metadata][kafka][topic]}"
      "kafka_partition" => "%{[@metadata][kafka][partition]}"
      "kafka_offset" => "%{[@metadata][kafka][offset]}"
    }
  }

  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["${LOGSTASH_ELASTICSEARCH_URL:http://elasticsearch:9200}"]
    index => "${LOGSTASH_SECURITY_EVENTS_INDEX:jobflow-security-events}"
    document_id => "%{requestId}"
    ilm_enabled => false
  }

  stdout {
    codec => rubydebug {
      metadata => false
    }
  }
}
